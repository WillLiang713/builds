services:
  builder:
    build:
      context: .
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    image: tr3000-immortalwrt-builder:bookworm
    working_dir: /workspace
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      WORKSPACE: /workspace
      SOURCE_DIR: /workspace/source
      OUTPUT_DIR: /workspace/output
      DL_DIR: /workspace/dl
      CCACHE_DIR: /workspace/ccache
      CONFIG_SEED: /workspace/configs/cudy_tr3000_128m.seed
      BASE_DEFCONFIG: ${BASE_DEFCONFIG:-/workspace/source/defconfig/mt7981-ax3000.config}
      UPSTREAM_REPO: ${UPSTREAM_REPO:-https://github.com/padavanonly/immortalwrt-mt798x-6.6.git}
      UPSTREAM_REF: ${UPSTREAM_REF:-}
      DEVICE_PROFILE: ${DEVICE_PROFILE:-cudy_tr3000-v1}
      DEVICE_KEYWORDS: ${DEVICE_KEYWORDS:-cudy,tr3000}
      DEVICE_VARIANT_KEYWORD: ${DEVICE_VARIANT_KEYWORD:-}
      NIKKI_FEED_NAME: ${NIKKI_FEED_NAME:-nikki}
      NIKKI_FEED_URL: ${NIKKI_FEED_URL:-https://github.com/nikkinikki-org/OpenWrt-nikki.git}
      NIKKI_FEED_BRANCH: ${NIKKI_FEED_BRANCH:-main}
      JOBS: ${JOBS:-}
      BUILD_VERBOSE: ${BUILD_VERBOSE:-0}
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true
